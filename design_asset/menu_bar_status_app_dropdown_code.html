<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Menu Bar Status App Dropdown</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1173d4",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .mac-vibrancy {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .mac-vibrancy {
            background-color: rgba(16, 25, 34, 0.85);
        }
        .custom-border {
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .dark .custom-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-200 dark:bg-slate-900 font-display flex items-start justify-center pt-10 min-h-screen">
<!-- macOS Menu Bar Popover Container -->
<div class="w-[320px] mac-vibrancy custom-border rounded-xl overflow-hidden flex flex-col shadow-2xl">
<!-- Top Status Bar -->
<header class="flex items-center justify-between px-4 pt-4 pb-2">
<div class="flex items-center gap-2 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-primary text-[20px]">timer</span>
<h2 class="text-sm font-bold tracking-tight">24:15 | Focus</h2>
</div>
<div class="flex gap-1">
<button class="p-1 hover:bg-black/5 dark:hover:bg-white/5 rounded transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[18px]">settings</span>
</button>
<button class="p-1 hover:bg-black/5 dark:hover:bg-white/5 rounded transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[18px]">more_vert</span>
</button>
</div>
</header>
<!-- Active Task Section -->
<div class="px-4 py-4 flex flex-col items-center text-center">
<span class="text-[10px] font-bold tracking-widest text-slate-400 dark:text-slate-500 uppercase mb-1">Active Task</span>
<h1 class="text-lg font-semibold text-slate-900 dark:text-slate-100 leading-tight">Update Design System</h1>
<!-- Controls -->
<div class="flex items-center justify-center gap-6 mt-4">
<button class="flex flex-col items-center gap-1 group">
<div class="size-9 rounded-full flex items-center justify-center bg-primary text-white hover:bg-primary/90 transition-all">
<span class="material-symbols-outlined text-[20px] fill-1">play_arrow</span>
</div>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400">Start</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="size-9 rounded-full flex items-center justify-center bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-300 dark:hover:bg-slate-700 transition-all">
<span class="material-symbols-outlined text-[20px]">pause</span>
</div>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400">Pause</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="size-9 rounded-full flex items-center justify-center bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-300 dark:hover:bg-slate-700 transition-all">
<span class="material-symbols-outlined text-[20px]">stop</span>
</div>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400">Stop</span>
</button>
</div>
</div>
<!-- Input Field -->
<div class="px-4 pb-4">
<div class="relative flex items-center border-b border-slate-200 dark:border-slate-800 focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-[18px] text-slate-400 mr-2">add</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-sm py-2 px-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="Hit Enter to add..." type="text"/>
</div>
</div>
<!-- Divider -->
<div class="h-[1px] bg-slate-200 dark:bg-slate-800 mx-4"></div>
<!-- Upcoming Focus -->
<div class="px-4 py-4">
<h3 class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">Upcoming Focus</h3>
<div class="space-y-3">
<div class="flex items-center gap-3 group cursor-pointer">
<div class="size-4 rounded border border-slate-300 dark:border-slate-700 flex items-center justify-center group-hover:border-primary transition-colors"></div>
<span class="text-sm text-slate-700 dark:text-slate-300">Finalize Landing Page Copy</span>
</div>
<div class="flex items-center gap-3 group cursor-pointer">
<div class="size-4 rounded border border-slate-300 dark:border-slate-700 flex items-center justify-center group-hover:border-primary transition-colors"></div>
<span class="text-sm text-slate-700 dark:text-slate-300">Client Strategy Meeting</span>
</div>
<div class="flex items-center gap-3 group cursor-pointer">
<div class="size-4 rounded border border-slate-300 dark:border-slate-700 flex items-center justify-center group-hover:border-primary transition-colors"></div>
<span class="text-sm text-slate-700 dark:text-slate-300">Refactor Auth Middleware</span>
</div>
</div>
</div>
<!-- Footer Stats -->
<footer class="mt-auto px-4 py-3 bg-black/5 dark:bg-white/5 flex justify-between items-center text-[10px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">
<span>Daily Progress: 4 / 12</span>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">bolt</span>
<span>Focus Score: 88</span>
</div>
</footer>
</div>
</body></html>
